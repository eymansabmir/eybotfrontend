name: Build and Push Frontend

on:
  push:
    branches:
      - main
      - dev
  release:
    types:
      - published
  workflow_dispatch:

# Required repository variables (Settings → Secrets and variables → Actions → Variables):
#
# Production (main branch + releases):
#   PROD_VITE_API_URL          https://whatsappbe.epfindia.gov.in/api
#   PROD_VITE_BASE_MEDIA_URL   https://whatsappbe.epfindia.gov.in/api/storage/file
#   PROD_ALLOWED_HOSTS         whatsappfe.epfindia.gov.in
#   PROD_CSP_CONNECT_SRC       https://whatsappbe.epfindia.gov.in
#
# Development (dev branch):
#   DEV_VITE_API_URL           https://devwhatsappbe.epf6.in/api
#   DEV_VITE_BASE_MEDIA_URL    https://devwhatsappbe.epf6.in/api/storage/file
#   DEV_ALLOWED_HOSTS          devwhatsappfe.epf6.in
#   DEV_CSP_CONNECT_SRC        https://devwhatsappbe.epf6.in

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-frontend
  VITE_ENABLE_VOICE_TECH: "false"
  VITE_ENABLE_USERS: "true"
  VITE_ENABLE_CAMPAIGNS: "true"
  VITE_DEFAULT_WHATSAPP_BSP: karix

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      VITE_API_URL: ${{ (github.event_name == 'release' || github.ref == 'refs/heads/main') && vars.PROD_VITE_API_URL || vars.DEV_VITE_API_URL }}
      VITE_BASE_MEDIA_URL: ${{ (github.event_name == 'release' || github.ref == 'refs/heads/main') && vars.PROD_VITE_BASE_MEDIA_URL || vars.DEV_VITE_BASE_MEDIA_URL }}
      ALLOWED_HOSTS: ${{ (github.event_name == 'release' || github.ref == 'refs/heads/main') && vars.PROD_ALLOWED_HOSTS || vars.DEV_ALLOWED_HOSTS }}
      CSP_CONNECT_SRC: ${{ (github.event_name == 'release' || github.ref == 'refs/heads/main') && vars.PROD_CSP_CONNECT_SRC || vars.DEV_CSP_CONNECT_SRC }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.sha }}

      - name: Validate build variables
        run: |
          missing=""
          for name in VITE_API_URL VITE_BASE_MEDIA_URL ALLOWED_HOSTS CSP_CONNECT_SRC; do
            eval "value=\$$name"
            if [ -z "$value" ]; then
              missing="$missing $name"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required build configuration:$missing"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=sha,format=long,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=dev-latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/dev' }}
            type=sha,prefix=dev-,format=long,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/dev' }}
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
            VITE_BASE_MEDIA_URL=${{ env.VITE_BASE_MEDIA_URL }}
            VITE_ENABLE_VOICE_TECH=${{ env.VITE_ENABLE_VOICE_TECH }}
            VITE_ENABLE_USERS=${{ env.VITE_ENABLE_USERS }}
            VITE_ENABLE_CAMPAIGNS=${{ env.VITE_ENABLE_CAMPAIGNS }}
            VITE_DEFAULT_WHATSAPP_BSP=${{ env.VITE_DEFAULT_WHATSAPP_BSP }}
            ALLOWED_HOSTS=${{ env.ALLOWED_HOSTS }}
            CSP_CONNECT_SRC=${{ env.CSP_CONNECT_SRC }}
