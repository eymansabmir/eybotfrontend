name: Build and Push Frontend

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-frontend
  # Vite build-time config — passed to Docker as build-args below
  VITE_API_URL: https://devwhatsappbe.epf6.in/api
  VITE_BASE_MEDIA_URL: https://devwhatsappbe.epf6.in/api/storage/file
  VITE_ENABLE_VOICE_TECH: "false"
  VITE_ENABLE_USERS: "true"
  VITE_ENABLE_CAMPAIGNS: "true"
  VITE_DEFAULT_WHATSAPP_BSP: karix
  # Nginx runtime config — baked into image (Host allowlist + CSP connect-src)
  ALLOWED_HOSTS: devwhatsappfe.epf6.in
  CSP_CONNECT_SRC: https://devwhatsappbe.epf6.in

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
            VITE_BASE_MEDIA_URL=${{ env.VITE_BASE_MEDIA_URL }}
            VITE_ENABLE_VOICE_TECH=${{ env.VITE_ENABLE_VOICE_TECH }}
            VITE_ENABLE_USERS=${{ env.VITE_ENABLE_USERS }}
            VITE_ENABLE_CAMPAIGNS=${{ env.VITE_ENABLE_CAMPAIGNS }}
            VITE_DEFAULT_WHATSAPP_BSP=${{ env.VITE_DEFAULT_WHATSAPP_BSP }}
            ALLOWED_HOSTS=${{ env.ALLOWED_HOSTS }}
            CSP_CONNECT_SRC=${{ env.CSP_CONNECT_SRC }}
