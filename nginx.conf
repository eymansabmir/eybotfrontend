server {
    listen 8080;

    location / {
        if ($http_host !~* (whatsapp-fe.epfindia.gov.in|localhost)) {
            return 403;
        }

        try_files $uri /index.html;
    }

    # 👇 ADD THIS
    location /health {
        access_log off;
        return 200 "ok";
    }
}
